# Optional local profile (no MySQL). Run with: -Dspring.profiles.active=dev
spring.datasource.url=jdbc:h2:mem:flintandthread;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Twilio optional in dev — OTP SMS is skipped when blank (see SmsService)
twilio.account.sid=
twilio.auth.token=
twilio.phone.number=
