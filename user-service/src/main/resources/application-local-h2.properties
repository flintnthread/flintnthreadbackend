# Activated automatically when MySQL is unavailable (see MysqlConnectivityFallbackListener).
# Or run explicitly: --spring.profiles.active=local-h2
spring.datasource.url=jdbc:h2:file:./data/flintdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER,VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
