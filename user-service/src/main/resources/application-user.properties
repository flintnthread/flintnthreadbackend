# =============================================================================
# USER SERVICE — database, integrations, and user-only settings
# =============================================================================

# --- Database (override via config/application-local.properties or /etc/flintnthread/application.properties) ---
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/flintdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- Server ---
spring.application.name=user-service
server.port=8080
server.address=0.0.0.0
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.messages.encoding=UTF-8
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Twilio (fallback only) ---
# Primary source: Admin → Platform Settings → Twilio (admin_settings table).
# Leave blank so one Admin token works for user + seller OTP.
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

# --- SendGrid SMTP (username is literally "apikey"; set SENDGRID_API_KEY env var on server/local) ---
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.sendgrid.net
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
logging.level.org.springframework.mail=DEBUG
app.mail.from=${MAIL_FROM:support@flintnthread.in}
app.mail.from-name=Flint & Thread

# --- Razorpay (live) ---
razorpay.key_id=rzp_live_RjYl272oYUIlCr
razorpay.key_secret=slKtHkfj1gcv62S6k3BYJQ23
razorpay.currency=INR
razorpay.company-name=F&T

# --- Shiprocket ---
# Set SHIPROCKET_EMAIL / SHIPROCKET_PASSWORD in config/application-local.properties (same as SendGrid / Twilio).
shiprocket.email=${SHIPROCKET_EMAIL:}
shiprocket.password=${SHIPROCKET_PASSWORD:}
shiprocket.api.base-url=https://apiv2.shiprocket.in/v1/external
shiprocket.dashboard.url=https://app.shiprocket.in/seller/home
shiprocket.pickup-location=${SHIPROCKET_PICKUP_LOCATION:ASVI HOME FOODS}
# Optional per-seller override of pickup nickname (NOT business name):
# Format: sellerId:Pickup Nickname,sellerId:Another Nickname
# shiprocket.pickup-location-by-seller=266:work,248:work

# --- Media / uploads ---
app.media.public-base-url=${MEDIA_PUBLIC_BASE_URL:https://flintnthread.com}
# Local/dev: serve files from the shared seller upload folder when CDN path is missing
app.upload.products-directory=${UPLOAD_PRODUCTS_DIR:../seller-service/uploads/products}
app.upload.dir=${UPLOAD_DIR:uploads}

# --- Invoice header details (used in generated HTML invoices) ---
invoice.seller.name=Flint & Thread (India) Pvt. Ltd.
invoice.seller.address=India
invoice.seller.phone=+91 9063499092
invoice.seller.email=support@flintnthread.in
invoice.seller.gstin=36AGQCF5402J1ZP

# --- App logs: payment, orders, Shiprocket ([PAYMENT], [ORDER], [SHIPROCKET]) ---
logging.level.com.ecommerce.authdemo=INFO

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# --- User service extras ---
ai.service.url=${AI_SERVICE_URL:http://127.0.0.1:5000}
ai.model.version=${AI_MODEL_VERSION:clip-vit-base-patch32}
app.upload.max-file-size-bytes=${UPLOAD_MAX_BYTES:26214400}
app.cloudinary.folder-prefix=${CLOUDINARY_FOLDER:flintnthread}
app.public-web-base-url=${PUBLIC_WEB_BASE_URL:https://flintnthread.in}
app.seller.frontend.base-url=${SELLER_FRONTEND_BASE_URL:https://flintnthread.in}
app.admin.frontend-url=${ADMIN_FRONTEND_BASE_URL:https://flintnthread.in}
app.mail.admin-notify=${ADMIN_NOTIFY_EMAIL:admin@flintnthread.in}
