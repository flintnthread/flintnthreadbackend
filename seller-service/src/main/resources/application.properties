# Seller service — imports unified platform config
# Default profile "local" uses port 8083 so user-service (8080) can run on the same PC.
# Production: set SPRING_PROFILES_ACTIVE=prod (port 8080)
spring.application.name=flintnthread-platform
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.config.import=classpath:flint-platform-common.properties,classpath:flint-platform-seller.properties,optional:file:../../application-local.properties
