# =============================================================================
# SELLER SERVICE — database, integrations, and seller-only settings
# =============================================================================

spring.application.name=demo
spring.devtools.restart.enabled=false

# === Database (override via config/application-local.properties or /etc/flintnthread/application.properties) ===
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/flintdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# === Server ===
server.port=${SELLER_SERVICE_PORT:8083}
server.address=0.0.0.0

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.messages.encoding=UTF-8

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# === CORS ===
app.cors.allowed-origins=http://localhost:8081,http://127.0.0.1:8081,http://localhost:19006,https://seller.flintnthread.online,https://admin.flintnthread.online,https://flintnthread.online
# === Email (SendGrid only) ===
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.sendgrid.net
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
logging.level.org.springframework.mail=DEBUG

app.mail.from=${MAIL_FROM:support@flintnthread.in}
app.mail.from-name=Flint & Thread Seller

# === Auth / Password Reset ===
# Public URLs for email links (verification / password reset).
# Defaults are PRODUCTION so deployed emails never open localhost on another device.
# Local overrides live in application-local.properties (profile=local).
app.backend.public-url=${APP_BACKEND_PUBLIC_URL:https://flintnthread.online}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:https://flintnthread.online/Seller}
app.frontend.email-verify-redirect-url=${app.frontend.base-url}/verify-email
app.frontend.password-reset-redirect-url=${app.frontend.base-url}/resetpassword
# Block verification emails that still point at localhost (except local profile)
app.mail.allow-localhost-links=${MAIL_ALLOW_LOCALHOST_LINKS:false}
app.admin.api-key=dev-admin-key
app.auth.password-reset-expiry-hours=1
app.auth.access-token-expires-seconds=86400
app.auth.email-verification-expiry-hours=1
app.auth.email-verification-otp-minutes=10

# === JWT (seller session) ===
app.jwt.secret=flint-seller-jwt-dev-secret-change-in-production-min-32-chars
app.jwt.expiry-hours=168

# === OTP (mobile) ===
app.otp.expiry-minutes=2
app.otp.verification-token-minutes=30
app.otp.dev-mode=false

# === Twilio ===
# Twilio (fallback only) — primary: Admin Platform Settings (admin_settings)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

