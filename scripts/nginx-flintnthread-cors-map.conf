# Loaded from /etc/nginx/conf.d/ (http context).
# Trusted browser Origins for flintnthread.online + flintnthread.in apps.
map $http_origin $fnt_cors_origin {
    default "";
    "~^https://([\w-]+\.)?flintnthread\.online$" $http_origin;
    "~^https://([\w-]+\.)?flintnthread\.in$"     $http_origin;
    "~^http://localhost(:\d+)?$"                 $http_origin;
    "~^http://127\.0\.0\.1(:\d+)?$"              $http_origin;
}
