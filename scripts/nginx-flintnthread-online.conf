# =============================================================================
# ONE domain: https://flintnthread.online/api/...
# Add INSIDE your existing server { } for flintnthread.online
# BEFORE the catch-all proxy_pass to user (8080).
#
# On VPS after editing:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Internal ports (from deploy-vps.sh):
#   user   -> 127.0.0.1:8080
#   admin  -> 127.0.0.1:8082
#   seller -> 127.0.0.1:8083
# =============================================================================

# --- ADMIN (all under /api/admin/) — no clash with user/seller ---
location ^~ /api/admin/ {
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- SELLER: paths that do NOT exist on user-service ---
location ^~ /api/public/ {
    proxy_pass http://127.0.0.1:8083;
