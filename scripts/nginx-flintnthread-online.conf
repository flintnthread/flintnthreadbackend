# =============================================================================
# API routing for https://flintnthread.online AND https://flintnthread.in
#
# VPS setup (run on server):
#   sudo cp scripts/nginx-flintnthread-cors-map.conf /etc/nginx/conf.d/flintnthread-cors-map.conf
#   sudo cp scripts/nginx-flintnthread-online.conf /etc/nginx/snippets/flintnthread-api.conf
#   # Inside server { } for BOTH flintnthread.online and flintnthread.in,
#   # BEFORE catch-all location / :
#   include snippets/flintnthread-api.conf;
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ports: user 8080 | admin 8082 | seller 8083
#
# CORS: strip Origin before proxy so older JARs still accept .in browsers;
# nginx sets Access-Control-Allow-Origin from $fnt_cors_origin (see cors-map).
# =============================================================================

# --- ADMIN ---
location ^~ /api/admin/ {
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin "";
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    add_header Access-Control-Allow-Origin $fnt_cors_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept" always;
    if ($request_method = OPTIONS) { return 204; }
}

