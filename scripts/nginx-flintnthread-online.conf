# =============================================================================
# ONE domain: https://flintnthread.online
#
# VPS setup (run on server):
#   sudo cp scripts/nginx-flintnthread-online.conf /etc/nginx/snippets/flintnthread-api.conf
#   # Inside server { } for flintnthread.online, BEFORE catch-all proxy to :8080:
#   include snippets/flintnthread-api.conf;
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ports: user 8080 | admin 8082 | seller 8083
#
# Seller business APIs live under /api/seller/* — no shared-path routing needed.
# =============================================================================

# --- ADMIN ---
location ^~ /api/admin/ {
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- SELLER SERVICE ---
location ^~ /api/seller/ {
    proxy_pass http://127.0.0.1:8083;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location ^~ /api/auth/ {
    proxy_pass http://127.0.0.1:8083;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location ^~ /api/public/ {
    proxy_pass http://127.0.0.1:8083;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location ^~ /api/sellers/ {
    proxy_pass http://127.0.0.1:8083;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Seller upload static files
location ^~ /uploads/sellers/ {
    proxy_pass http://127.0.0.1:8083;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
location ^~ /uploads/seller_documents/ {
