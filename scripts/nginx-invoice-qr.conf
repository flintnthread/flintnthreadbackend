# Invoice QR — add BEFORE the SPA catch-all in nginx server { } block.

# 1) Serve standalone invoice viewer (upload dist/invoice-mobile-view.html).
location = /invoice-mobile-view.html {
    try_files $uri =404;
}

# 2) Proxy stored invoice HTML files from Spring Boot (not Expo SPA).
location ~ ^/invoices/Invoice_.+\.html$ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 3) Old QR paths → standalone viewer (keeps order_id / seller_id query params).
location = /html-invoice {
    return 302 /invoice-mobile-view.html$is_args$args;
}

location = /html-invoice.html {
    return 302 /invoice-mobile-view.html$is_args$args;
}

# 4) API fallbacks (after backend deploy with invoice-html endpoint).
location = /api/invoices/view-html {
    return 302 /api/email/preview/invoice-html$is_args$args;
}
